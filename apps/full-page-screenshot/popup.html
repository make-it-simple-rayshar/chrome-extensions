<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      width: 280px;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 14px;
      color: #1a1a1a;
      background: #fff;
    }
    h1 {
      font-size: 15px;
      font-weight: 600;
      margin-bottom: 12px;
    }
    #captureBtn {
      width: 100%;
      padding: 10px 0;
      border: none;
      border-radius: 6px;
      background: #1a73e8;
      color: #fff;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s;
    }
    #captureBtn:hover {
      background: #1557b0;
    }
    #captureBtn:disabled {
      background: #94b8e8;
      cursor: default;
    }
    #progressContainer {
      display: none;
      margin-top: 12px;
    }
    #progressBar {
      width: 100%;
      height: 6px;
      background: #e8eaed;
      border-radius: 3px;
      overflow: hidden;
    }
    #progressFill {
      height: 100%;
      width: 0%;
      background: #1a73e8;
      border-radius: 3px;
      transition: width 0.3s ease;
    }
    #statusText {
      margin-top: 6px;
      font-size: 12px;
      color: #5f6368;
    }
    #errorText {
      display: none;
      margin-top: 10px;
      font-size: 12px;
      color: #d93025;
    }
  </style>
</head>
<body>
  <h1>Full Page Screenshot</h1>
  <button id="captureBtn">Capture Full Page</button>
  <div id="progressContainer">
    <div id="progressBar">
      <div id="progressFill"></div>
    </div>
    <div id="statusText">Preparing...</div>
  </div>
  <div id="errorText"></div>
  <script src="popup.js"></script>
</body>
</html>
